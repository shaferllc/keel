name: Release

# Publishing is driven by the tag, so npm can't drift from git the way it did:
# git reached v0.77.0 while npm's `latest` still said 0.74.0, and the versions that
# had been published were sporadic (0.12, 0.35, 0.58, 0.66, 0.68, 0.74…).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Trusted publishing: npm mints a short-lived credential from this workflow's
      # OIDC identity, so there is no token to leak or rotate. It also attaches a
      # provenance attestation — proof the tarball was built from this commit, by
      # this workflow, rather than uploaded from someone's laptop.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Node 22 ships npm 10, which cannot do OIDC — trusted publishing needs
      # npm >= 11.5.1. Without this the publish fails asking for a token.
      - name: npm that can do trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: npm ci --ignore-scripts

      # The tag IS the release. If it disagrees with package.json, something is
      # wrong, and publishing the wrong version is worse than not publishing.
      - name: The tag matches package.json
        run: |
          pkg="$(node -p 'require("./package.json").version')"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="${GITHUB_REF_NAME#v}"
            if [ "$tag" != "$pkg" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} says ${tag}, package.json says ${pkg}."
              exit 1
            fi
          fi
          echo "publishing ${pkg}"

      # Never publish something that doesn't pass. CI runs these on pushes to main,
      # but a tag can point at any commit — including one CI never saw.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # The build is what `prepare` runs on a git install, and what produces the
      # dist/ that actually ships. A tree that can't build can't be published.
      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public

      # create-keeljs is a separate unscoped package (npm create keeljs@latest).
      # Templates live in @shaferllc/keel; this package is only the thin copier.
      # Versioned independently — bump packages/create-keeljs/package.json when the
      # generator itself changes, not on every framework release. Skip when that
      # version is already on the registry so framework tags don't fail the job.
      - name: Publish create-keeljs
        working-directory: packages/create-keeljs
        continue-on-error: true
        run: |
          ver="$(node -p 'require("./package.json").version')"
          if npm view "create-keeljs@${ver}" version >/dev/null 2>&1; then
            echo "create-keeljs@${ver} already on npm — skip"
            exit 0
          fi
          npm publish --access public
          echo "::notice::Published create-keeljs@${ver}"
          # If this 404s, the package needs a trusted publisher on npm (same workflow
          # as @shaferllc/keel) or a local `npm publish --otp=…` from a maintainer.

      # keeljs.com renders the guides out of the published package, so a release it
      # doesn't hear about is a docs site that quietly lags the framework — which
      # is how the site sat on 0.78.2 while npm had 0.79.0.
      #
      # This is only a shortcut. The site polls npm every 30 minutes and bumps
      # itself, so the loop closes with or without this step; all a dispatch buys
      # is deploying now instead of within the half hour. It needs a PAT with
      # `contents: write` on shaferllc/keel-site (as SITE_DISPATCH_TOKEN), because
      # the automatic GITHUB_TOKEN cannot trigger a workflow in another repo — and
      # a long-lived cross-repo credential is a real cost for a 30-minute saving,
      # so not setting one is a perfectly good answer.
      - name: Tell the site to deploy
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "No SITE_DISPATCH_TOKEN — the site's npm poll will pick this up within 30m."
            exit 0
          fi
          version="$(node -p 'require("./package.json").version')"
          gh api /repos/shaferllc/keel-site/dispatches \
            -f event_type=keel-released \
            -F "client_payload[version]=${version}"
          echo "dispatched keel-released ${version}"
